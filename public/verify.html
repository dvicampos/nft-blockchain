<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Verificar Certificado</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0b1736;
      color: white;
      padding: 32px;
    }
    .container { max-width: 1000px; margin: 0 auto; }
    .card {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 20px;
      padding: 22px;
      margin-bottom: 20px;
    }
    input, button {
      width: 100%;
      padding: 12px;
      border-radius: 12px;
      border: none;
      margin-bottom: 12px;
    }
    input { background: #172554; color: white; }
    button {
      background: linear-gradient(135deg, #2563eb, #4f46e5);
      color: white;
      font-weight: bold;
      cursor: pointer;
    }
    img {
      max-width: 100%;
      border-radius: 16px;
      display: block;
      margin-top: 14px;
    }
    .ok { color: #86efac; }
    .error { color: #fca5a5; }
    a { color: #93c5fd; }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <h1>Verificación de certificado</h1>
      <input id="tokenIdInput" placeholder="Ingresa Token ID" />
      <button id="verifyBtn">Verificar</button>
      <div id="status">Esperando consulta...</div>
    </div>

    <div class="card" id="resultCard" style="display:none;">
      <h2 id="name"></h2>
      <p id="description"></p>
      <p><strong>Owner:</strong> <span id="owner"></span></p>
      <p><strong>Issuer:</strong> <span id="issuer"></span></p>
      <p><strong>Hash:</strong> <span id="hash"></span></p>
      <p><strong>Metadata:</strong> <a id="metadataLink" target="_blank"></a></p>
      <img id="image" alt="Certificado" />
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/ethers@6.13.2/dist/ethers.umd.min.js"></script>
  <script>
    const contractAddress = "PEGA_AQUI_TU_DIRECCION_DEPLOY";

    const contractABI = [
      "function certificates(uint256) view returns (string metadataURI, string documentHash, address issuer, uint256 issuedAt)",
      "function ownerOf(uint256 tokenId) view returns (address)",
      "function tokenURI(uint256 tokenId) view returns (string)"
    ];

    const provider = new ethers.JsonRpcProvider("http://127.0.0.1:8545");
    const contract = new ethers.Contract(contractAddress, contractABI, provider);

    document.getElementById("verifyBtn").addEventListener("click", async () => {
      try {
        const tokenId = document.getElementById("tokenIdInput").value.trim();
        if (!tokenId) {
          document.getElementById("status").innerHTML = '<span class="error">Ingresa un Token ID</span>';
          return;
        }

        document.getElementById("status").textContent = "Consultando...";
        const certData = await contract.certificates(tokenId);
        const owner = await contract.ownerOf(tokenId);
        const tokenUri = await contract.tokenURI(tokenId);

        const metadataRes = await fetch(tokenUri);
        const metadata = await metadataRes.json();

        document.getElementById("name").textContent = metadata.name;
        document.getElementById("description").textContent = metadata.description;
        document.getElementById("owner").textContent = owner;
        document.getElementById("issuer").textContent = certData.issuer;
        document.getElementById("hash").textContent = certData.documentHash;
        document.getElementById("metadataLink").href = tokenUri;
        document.getElementById("metadataLink").textContent = tokenUri;
        document.getElementById("image").src = metadata.image;

        document.getElementById("resultCard").style.display = "block";
        document.getElementById("status").innerHTML = '<span class="ok">Certificado verificado correctamente ✅</span>';
      } catch (error) {
        document.getElementById("status").innerHTML = `<span class="error">${error.shortMessage || error.message}</span>`;
      }
    });
  </script>
</body>
</html>
